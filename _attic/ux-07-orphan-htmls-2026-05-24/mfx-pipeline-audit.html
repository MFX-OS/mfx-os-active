<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MFX OS · Pipeline Audit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d14;color:#e0f2fe;font-family:'Inter','SF Pro',system-ui,sans-serif;padding:20px;max-width:1100px;margin:0 auto}
h1{font-size:26px;font-weight:900;color:#00e5ff;margin-bottom:2px}
.sub{font-size:11px;color:#64748b;margin-bottom:20px;letter-spacing:1px}

/* Pipeline arrow strip */
.pipeline{display:flex;gap:2px;margin-bottom:24px;overflow-x:auto;padding-bottom:6px}
.pipe-step{flex:1;min-width:80px;padding:10px 6px;text-align:center;border-radius:10px;cursor:pointer;transition:all .15s;border:2px solid transparent}
.pipe-step:hover{border-color:rgba(0,229,255,.3)}
.pipe-step.sel{border-color:#00e5ff;box-shadow:0 0 16px rgba(0,229,255,.2)}
.pipe-ico{font-size:22px;margin-bottom:3px}
.pipe-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8}
.pipe-pct{font-size:14px;font-weight:900;margin-top:2px}
.pipe-bar{height:4px;background:#142636;border-radius:99px;margin-top:4px;overflow:hidden}
.pipe-fill{height:100%;border-radius:99px}

/* Detail panel */
.detail{background:#0f1d2b;border:1px solid #1e3a4f;border-radius:14px;padding:20px;margin-bottom:16px;display:none}
.detail.active{display:block}
.d-title{font-size:18px;font-weight:800;color:#e0f2fe;margin-bottom:2px}
.d-sub{font-size:11px;color:#64748b;margin-bottom:16px}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.d-grid{grid-template-columns:1fr}}

.d-col{background:#0a1520;border:1px solid #1e3a4f;border-radius:10px;padding:14px}
.d-col-title{font-size:12px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.d-item{font-size:11px;color:#94a3b8;line-height:1.7;padding-left:16px;position:relative}
.d-item::before{content:'';position:absolute;left:0;top:8px;width:8px;height:8px;border-radius:50%}
.d-item.has::before{background:#22c55e}
.d-item.partial::before{background:#fbbf24}
.d-item.miss::before{background:#ef4444}
.d-item code{font-size:10px;color:#00e5ff;background:#142636;padding:1px 5px;border-radius:4px}
.d-item strong{color:#e0f2fe;font-weight:600}

/* Build items */
.build-item{background:#0a1520;border:1px solid #1e3a4f;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.build-num{font-size:10px;font-weight:800;color:#00e5ff;background:rgba(0,229,255,.12);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.build-text{font-size:11px;color:#94a3b8;line-height:1.5}
.build-text strong{color:#e0f2fe}
.build-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-top:4px;display:inline-block}
.tag-sw{background:rgba(34,197,94,.15);color:#22c55e}
.tag-hw{background:rgba(251,191,36,.15);color:#fbbf24}
.tag-api{background:rgba(0,229,255,.12);color:#00e5ff}

/* Summary bar */
.sumbar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.sumcard{background:#0f1d2b;border:1px solid #1e3a4f;border-radius:12px;padding:14px;text-align:center}
.sumval{font-size:28px;font-weight:900}
.sumlbl{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.footer{text-align:center;padding:20px 0;font-size:9px;color:#1e3a4f;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>

<h1>MFX OS · Pipeline Gap Analysis</h1>
<div class="sub">LEAD → QUOTE → PO → SO → PASSPORT → TICKET → VENDOR → TRACKING → SHIP → INVOICE → PAYMENT</div>

<div class="sumbar">
  <div class="sumcard"><div class="sumval" style="color:#22c55e">52%</div><div class="sumlbl">Average Coverage</div></div>
  <div class="sumcard"><div class="sumval" style="color:#fbbf24">6</div><div class="sumlbl">Partially Built</div></div>
  <div class="sumcard"><div class="sumval" style="color:#ef4444">1</div><div class="sumlbl">Nearly Missing (Shipping)</div></div>
</div>

<!-- PIPELINE STRIP -->
<div class="pipeline" id="pipeline"></div>

<!-- DETAIL PANELS -->
<div id="details"></div>

<div class="footer">MFX OS v2.2 · Pipeline Audit · April 2026</div>

// Render pipeline strip
const pl = document.getElementById('pipeline');
steps.forEach((s,i) => {
  const bg = s.pct >= 70 ? 'rgba(34,197,94,.1)' : s.pct >= 40 ? 'rgba(251,191,36,.1)' : 'rgba(239,68,68,.1)';
  pl.innerHTML += `<div class="pipe-step" id="ps-${s.id}" onclick="showStep('${s.id}')" style="background:${bg}">
    <div class="pipe-ico">${s.ico}</div>
    <div class="pipe-lbl">${s.label}</div>
    <div class="pipe-pct" style="color:${s.color}">${s.pct}%</div>
    <div class="pipe-bar"><div class="pipe-fill" style="width:${s.pct}%;background:${s.color}"></div></div>
  </div>`;
});

// Render detail panels
const det = document.getElementById('details');
steps.forEach(s => {
  let h = `<div class="detail" id="d-${s.id}">`;
  h += `<div class="d-title">${s.ico} ${s.label}</div>`;
  h += `<div class="d-sub">${s.summary}</div>`;
  h += `<div class="d-grid">`;

  // HAVE column
  h += `<div class="d-col"><div class="d-col-title" style="color:#22c55e">✅ What We Have</div>`;
  s.have.forEach(item => { h += `<div class="d-item ${item.s}">${item.t}</div>`; });
  h += `</div>`;

  // NEED column
  h += `<div class="d-col"><div class="d-col-title" style="color:#ef4444">❌ What's Missing</div>`;
  s.need.forEach(item => { h += `<div class="d-item ${item.s}">${item.t}</div>`; });
  h += `</div>`;

  h += `</div>`; // close grid

  // BUILD section
  h += `<div style="margin-top:14px"><div style="font-size:12px;font-weight:800;color:#00e5ff;margin-bottom:8px">🔧 What To Build</div>`;
  s.build.forEach((b,i) => {
    const tagClass = b.tag === 'sw' ? 'tag-sw' : b.tag === 'api' ? 'tag-api' : 'tag-hw';
    const tagLabel = b.tag === 'sw' ? 'Software' : b.tag === 'api' ? 'API Integration' : 'Hardware';
    h += `<div class="build-item"><div class="build-num">${i+1}</div><div><div class="build-text">${b.t}</div><div class="build-tag ${tagClass}">${tagLabel}</div></div></div>`;
  });
  h += `</div>`;

  h += `</div>`;
  det.innerHTML += h;
});

// Show first step
function showStep(id) {
  document.querySelectorAll('.pipe-step').forEach(el => el.classList.remove('sel'));
  document.querySelectorAll('.detail').forEach(el => el.classList.remove('active'));
  document.getElementById('ps-'+id).classList.add('sel');
  document.getElementById('d-'+id).classList.add('active');
}
showStep('leads');
</script>
