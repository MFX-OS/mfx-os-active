# MFX OS — Pull Request Checks
# Runs on every PR: builds bundle, checks syntax, runs security audit.
# Fails the PR if any check fails.

name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  build-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Build bundle
        run: npm run build

      - name: Verify chunked bundles exist and references match
        # PERF-09 split: build.js produces mfx-core (always loaded) plus
        # mfx-chat, mfx-ai, mfx-mats (lazy). Index + SW reference the core
        # filename; the chunk manifest in core.js points at the rest.
        run: |
          set -e
          CHUNKS=(core chat ai mats)
          for c in "${CHUNKS[@]}"; do
            f=$(ls public/js/mfx-$c.*.js 2>/dev/null | head -1)
            if [ -z "$f" ]; then
              echo "::error::No mfx-$c.*.js bundle generated"
              exit 1
            fi
            echo "  ✓ $(basename "$f") ($(wc -c < "$f") bytes)"
          done
          CORE_NAME=$(basename "$(ls public/js/mfx-core.*.js | head -1)")
          if ! grep -q "$CORE_NAME" public/index.html; then
            echo "::error::index.html does not reference $CORE_NAME"
            exit 1
          fi
          if ! grep -q "$CORE_NAME" public/sw.js; then
            echo "::error::sw.js does not reference $CORE_NAME"
            exit 1
          fi

      - name: Syntax check all chunks
        run: |
          for f in public/js/mfx-core.*.js public/js/mfx-chat.*.js public/js/mfx-ai.*.js public/js/mfx-mats.*.js; do
            node -c "$f"
          done

      - name: Syntax check functions/index.js
        run: node -c functions/index.js

      - name: Smoke-load functions module
        # Catches require()/export breakage from refactors (e.g. the
        # functions/lib reorg landed in rounds 54a/54b).
        run: |
          cd functions
          node -e "const x = require('./index.js'); const n = Object.keys(x).length; if (n < 40) { console.error('Only', n, 'exports found — expected 50+'); process.exit(1); } console.log(n, 'function exports loaded OK')"

      - name: Check for forbidden files under public/
        run: |
          if ls public/*-data.json 2>/dev/null; then
            echo "::error::Data dump files found under public/ — these are publicly served. Move them to data-archive/."
            exit 1
          fi
          if ls public/*.rules 2>/dev/null; then
            echo "::error::.rules files found under public/ — these would be publicly served."
            exit 1
          fi

      - name: Security audit (root)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Security audit (functions)
        run: cd functions && npm audit --omit=dev --audit-level=high
        continue-on-error: true
