<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<meta name="theme-color" content="#060d14">
<title>MFX OS — Offline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d14;--surface:#0a1520;--card:#0f1d2b;--border:#1a2d40;--tx:#e0f2fe;--tx2:#94a3b8;--tx3:#5a7888;--ac:#00e5ff;--rd:#ef4444;--gn:#22c55e}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;color:var(--tx2);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom))}
.card{max-width:420px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.icon{width:72px;height:72px;border-radius:50%;background:rgba(0,229,255,.08);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;border:1px solid rgba(0,229,255,.15)}
.icon svg{width:36px;height:36px;stroke:var(--ac);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.logo-img{height:30px;width:auto;margin:0 auto 10px;display:block;filter:drop-shadow(0 0 10px rgba(0,229,255,.2))}
.logo{font-family:Outfit,Inter,sans-serif;font-size:26px;font-weight:900;color:var(--tx);letter-spacing:-.5px;margin-bottom:4px}
.logo .sub{font-weight:300;color:var(--tx3)}
.logo-line{width:50px;height:2px;background:var(--ac);border-radius:1px;margin:6px auto 18px}
h1{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:10px;letter-spacing:-.2px}
p{font-size:13px;line-height:1.6;color:var(--tx2);margin-bottom:8px}
.muted{color:var(--tx3);font-size:11px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
.actions{display:flex;flex-direction:column;gap:10px;margin-top:22px}
button{width:100%;padding:14px;background:linear-gradient(135deg,#00e5ff,#0891b2);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;font-family:inherit;min-height:48px;transition:transform .1s,box-shadow .15s}
button:hover{box-shadow:0 0 24px rgba(0,229,255,.3)}
button:active{transform:scale(.98)}
button.ghost{background:transparent;color:var(--ac);border:1px solid var(--border)}
button.ghost:hover{background:rgba(0,229,255,.06);border-color:rgba(0,229,255,.25)}
.status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.status.offline{background:rgba(239,68,68,.08);color:var(--rd);border:1px solid rgba(239,68,68,.25)}
.status.online{background:rgba(34,197,94,.08);color:var(--gn);border:1px solid rgba(34,197,94,.25)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="card">
  <img src="/logo.png" alt="Microflex Film Corporation" class="logo-img">
  <div class="logo">Microflex <span class="sub">Film Corp</span></div>
  <div class="logo-line"></div>

  <div class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1"/>
    </svg>
  </div>

  <div id="statusBadge" class="status offline" role="status" aria-live="polite">
    <span class="dot" aria-hidden="true"></span>
    <span id="statusText">Offline</span>
  </div>

  <h1>You're offline</h1>
  <p>MFX OS can't reach the server right now.</p>
  <p>Your work in progress is safe locally and will sync automatically when you reconnect.</p>

  <div class="actions">
    <button onclick="tryReconnect()" id="retryBtn" aria-label="Retry connection">Retry connection</button>
    <button class="ghost" onclick="goHome()" aria-label="Open homepage">Open homepage</button>
  </div>

  <div class="muted">
    If this keeps happening, check your Wi-Fi or cellular signal.<br>
    Need help? Email <a href="mailto:support@microflexfilm.com" style="color:var(--ac);text-decoration:none">support@microflexfilm.com</a>
  </div>
</div>

<script>
// Auto-update status badge when connectivity changes; auto-reload when back online.
function setOnlineStatus(online){
  var badge=document.getElementById('statusBadge');
  var text=document.getElementById('statusText');
  if(online){
    badge.className='status online';
    text.textContent='Back online';
    setTimeout(function(){ location.href='/'; }, 800);
  } else {
    badge.className='status offline';
    text.textContent='Offline';
  }
}
function tryReconnect(){
  var btn=document.getElementById('retryBtn');
  btn.disabled=true;
  btn.textContent='Checking…';
  // Use a tiny fetch with no-cache to bypass SW
  fetch('/manifest.json', {cache:'no-store'})
    .then(function(r){
      if(r.ok){ setOnlineStatus(true); }
      else { throw new Error('not ok'); }
    })
    .catch(function(){
      btn.disabled=false;
      btn.textContent='Still offline — Retry';
      setTimeout(function(){ btn.textContent='Retry connection'; }, 2000);
    });
}
function goHome(){ location.href='/'; }
window.addEventListener('online', function(){ setOnlineStatus(true); });
window.addEventListener('offline', function(){ setOnlineStatus(false); });
// Initial check
if(navigator.onLine === false) setOnlineStatus(false);
else setOnlineStatus(true);
</script>
</body>
</html>
