#0a2535;border-bottom:1px solid rgba(0,229,255,0.12);padding:0;display:none;align-items:center;gap:12px;font-family:Outfit,sans-serif"><a href="/" style="color:#00e5ff;text-decoration:none;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid rgba(0,229,255,0.2);border-radius:4px">← MFX OS</a><span style="color:#4a6478;font-size:10px;letter-spacing:0.1em">JOB TRACKER</span></div><div style="height:0"></div>

var firebaseConfig={apiKey:"AIzaSyA5N8V4jVNe4pVt3jmjEdbQEfv1lnKj7PM",authDomain:"os.microflexfilm.com",projectId:"mfx-2026",storageBucket:"mfx-2026.firebasestorage.app",messagingSenderId:"21746521413",appId:"1:21746521413:web:7229f14cabaebb1e0a1a2c"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var jtDb=firebase.firestore();var jtAuth=firebase.auth();

// Helper to normalize a Firestore doc into a ticket object
function __mfxNormalize(d){
  var data=d.data();data.id=d.id;
  if(!data.notes)data.notes=[];
  if(!data.purchaseOrders)data.purchaseOrders=[];
  if(!data.deliveryReleases)data.deliveryReleases=[];
  if(!data.reminders)data.reminders=[];
  if(!data.qcChecks)data.qcChecks=[];
  if(!data.timeline)data.timeline=[];
  if(!data.watchers)data.watchers=[];
  if(!data.activity)data.activity=[];
  // Ensure jobStatus exists for Kanban column placement
  if(!data.jobStatus)data.jobStatus=data.workflowStatus||"CSR Intake";
  if(!data.jobTicketNumber && data.ticketNumber)data.jobTicketNumber=data.ticketNumber;
  if(!data.healthScore)data.healthScore=50;
  if(typeof data.value==="string")data.value=parseFloat(data.value)||0;
  if(typeof data.balanceOpen==="string")data.balanceOpen=parseFloat(data.balanceOpen)||0;
  if(typeof data.paymentTotal==="string")data.paymentTotal=parseFloat(data.paymentTotal)||0;
  if(!data.estActual)data.estActual={quantityOrdered:0,quantityShipped:0,estimatedTotal:0,actualTotal:0,rows:[],grossMarginEst:0,grossMarginAct:0,varianceNotes:"",lastUpdated:"",approvedBy:""};
  if(!data.blocked)data.blocked="No";
  if(!data.rush)data.rush=false;
  if(!data.closureStatus)data.closureStatus=data.jobStatus==="Closed"||data.jobStatus==="Cancelled"?"Closed":"Open";
  return data;
}

// Start real-time listener once authenticated
jtAuth.onAuthStateChanged(function(user){
  if(!user)return;
  
  // REAL-TIME LISTENER — fires on every change from ANY user
  jtDb.collection("jobTickets").onSnapshot(function(snap){
    var tickets=snap.docs.map(__mfxNormalize);
    window.__MFX_TICKETS=tickets;
    
    // Dispatch custom event so React component picks up changes
    window.__MFX_SKIP_NEXT_SAVE=true; // Don't save back what we just received
    window.dispatchEvent(new CustomEvent("mfx-tickets-update",{detail:{tickets:tickets}}));
    console.log("\u2705 Real-time sync: "+tickets.length+" tickets (from: "+(snap.metadata.hasPendingWrites?"local":"server")+")");
  },function(err){
    console.warn("Firestore listener error:",err);
  });
});

// Save function — debounced, skips if the update came from Firestore listener
window.__MFX_SAVE_TICKETS=function(tickets){
  if(window.__MFX_SKIP_NEXT_SAVE){window.__MFX_SKIP_NEXT_SAVE=false;return;}
  if(!jtAuth.currentUser||!Array.isArray(tickets)||tickets.length===0)return;
  clearTimeout(window.__MFX_SAVE_TIMER);
  window.__MFX_SAVE_TIMER=setTimeout(function(){
    var batch=jtDb.batch();
    tickets.forEach(function(t){
      if(!t||!t.id)return;
      var doc=jtDb.collection("jobTickets").doc(String(t.id));
      var data=JSON.parse(JSON.stringify(t));
      data.updatedAt=new Date().toISOString();
      batch.set(doc,data,{merge:true});
    });
    batch.commit().then(function(){
      console.log("\u2705 Saved "+tickets.length+" tickets to Firestore");
    }).catch(function(e){console.warn("Save failed:",e)});
  },600);
};

// ═══ ONLINE PRESENCE BAR ═══
var __mfxOnlineUsers=[];
var __mfxUserMoods={};

function __mfxStartPresence(){
  // Update own presence every 60s
  function updateMyPresence(){
    if(!jtAuth.currentUser)return;
    jtDb.collection("users").doc(jtAuth.currentUser.uid).set({
      name:jtAuth.currentUser.displayName||jtAuth.currentUser.email.split("@")[0],
      email:jtAuth.currentUser.email,
      lastSeen:firebase.firestore.FieldValue.serverTimestamp(),
      online:true,
      currentView:"Job Tracker"
    },{merge:true}).catch(function(){});
  }
  updateMyPresence();
  setInterval(updateMyPresence,60000);

  // Real-time listener for online users (seen in last 5 min)
  var fiveMinAgo=new Date(Date.now()-5*60*1000);
  jtDb.collection("users").where("lastSeen",">",fiveMinAgo).onSnapshot(function(snap){
    __mfxOnlineUsers=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
    __mfxRenderPresenceBar();
  },function(){});

  // Get latest mood/message per user from microfeed
  jtDb.collection("microfeed").orderBy("timestamp","desc").limit(30).onSnapshot(function(snap){
    __mfxUserMoods={};
    snap.docs.forEach(function(d){
      var data=d.data();
      if(data.user&&!__mfxUserMoods[data.user]){
        __mfxUserMoods[data.user]={mood:data.mood||"",message:data.message||"",timestamp:data.timestamp};
      }
    });
    __mfxRenderPresenceBar();
  },function(){});
}

function __mfxGetInitials(name){
  if(!name)return"?";
  var parts=name.split(" ");
  if(parts.length>=2)return(parts[0][0]+parts[1][0]).toUpperCase();
  return name.substring(0,2).toUpperCase();
}

function __mfxGetColor(name){
  var colors=["#00e5ff","#ff4081","#69f0ae","#ffab40","#ea80fc","#40c4ff","#ffd740","#b388ff"];
  var hash=0;for(var i=0;i<(name||"").length;i++)hash=name.charCodeAt(i)+((hash<<5)-hash);
  return colors[Math.abs(hash)%colors.length];
}

function __mfxTimeAgo(ts){
  if(!ts)return"";
  var d=ts.toDate?ts.toDate():new Date(ts);
  var s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<60)return"just now";
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}

function __mfxRenderPresenceBar(){
  var bar=document.getElementById("mfx-presence-bar");
  if(!bar)return;
  if(__mfxOnlineUsers.length===0){bar.innerHTML="<span style=\"color:#4a6478;font-size:11px;letter-spacing:.08em\">No users online</span>";return;}
  
  var h="";
  __mfxOnlineUsers.forEach(function(u){
    var name=u.name||u.email||"Unknown";
    var initials=__mfxGetInitials(name);
    var color=__mfxGetColor(name);
    var moodData=__mfxUserMoods[name]||{};
    var mood=moodData.mood||"";
    var message=moodData.message||"";
    var role=u.role||"Team Member";
    var dept=u.dept||"";
    var view=u.currentView||"";
    var uid=u.id||"";
    var isMe=jtAuth.currentUser&&uid===jtAuth.currentUser.uid;
    
    h+="<div class=\"presence-bubble\" style=\"position:relative;display:inline-block\">";
    h+="<div class=\"pb-avatar\" style=\"width:36px;height:36px;border-radius:50%;background:"+color+"22;border:2px solid "+color+";display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:"+color+";cursor:pointer;position:relative;transition:transform .15s\">";
    h+=initials;
    h+="<div style=\"position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#43d17a;border:2px solid #060d14\"></div>";
    if(mood)h+="<div style=\"position:absolute;top:-6px;right:-6px;font-size:12px\">"+mood+"</div>";
    h+="</div>";
    
    // Hover card
    h+="<div class=\"pb-card\" style=\"display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0d2d40;border:1px solid #00e5ff38;border-radius:8px;padding:12px 16px;min-width:220px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.5)\">";
    h+="<div style=\"font-size:13px;font-weight:700;color:#f5f2ed;margin-bottom:2px\">"+name+(isMe?" <span style=\"color:#00e5ff;font-size:10px\">(you)</span>":"")+"</div>";
    h+="<div style=\"font-size:10px;color:#8aa8b8;margin-bottom:8px;letter-spacing:.05em\">"+role+(dept?" · "+dept:"")+"</div>";
    if(view)h+="<div style=\"font-size:10px;color:#4a6478;margin-bottom:4px\"><span style=\"color:#00e5ff\">◉</span> Currently on: "+view+"</div>";
    if(message)h+="<div style=\"font-size:11px;color:#8aa8b8;background:#060d14;border-radius:5px;padding:6px 8px;margin-top:6px;border-left:2px solid "+color+"\">"+(mood?mood+" ":"")+message+"</div>";
    h+="<div style=\"position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#0d2d40;border-right:1px solid #00e5ff38;border-bottom:1px solid #00e5ff38;transform:translateX(-50%) rotate(45deg)\"></div>";
    h+="</div>";
    h+="</div>";
  });
  
  bar.innerHTML=h;
  
  // Add hover listeners
  bar.querySelectorAll(".presence-bubble").forEach(function(bubble){
    var card=bubble.querySelector(".pb-card");
    var avatar=bubble.querySelector(".pb-avatar");
    bubble.addEventListener("mouseenter",function(){
      card.style.display="block";
      avatar.style.transform="scale(1.15)";
    });
    bubble.addEventListener("mouseleave",function(){
      card.style.display="none";
      avatar.style.transform="scale(1)";
    });
  });
}

// Start presence once authenticated
jtAuth.onAuthStateChanged(function(u){if(u)setTimeout(__mfxStartPresence,1500)});

// ═══ COLLABORATION PANEL ═══
var __mfxCollabOpen=false;
var __mfxNotes=[];
var __mfxHistory=[];
var __mfxPageUsers=[];

function __mfxStartCollab(){
  // Real-time notes listener for this page
  jtDb.collection("collaboration").doc("jobtracker").collection("notes")
    .orderBy("timestamp","desc").limit(50)
    .onSnapshot(function(snap){
      __mfxNotes=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
      __mfxRenderCollab();
    },function(){});

  // Activity history for job tickets
  jtDb.collection("activity").orderBy("timestamp","desc").limit(30)
    .onSnapshot(function(snap){
      __mfxHistory=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
      __mfxRenderCollab();
    },function(){});
}

function __mfxPostNote(text){
  if(!text||!text.trim()||!jtAuth.currentUser)return;
  var user=jtAuth.currentUser;
  var name=user.displayName||user.email.split("@")[0];
  
  // Extract @mentions
  var mentions=[];
  var mentionRx=/@([\w\s]+?)(?=\s|@|$)/g;
  var m;while((m=mentionRx.exec(text))!==null){mentions.push(m[1].trim())}
  
  jtDb.collection("collaboration").doc("jobtracker").collection("notes").add({
    text:text.trim(),
    author:name,
    authorId:user.uid,
    authorEmail:user.email,
    mentions:mentions,
    page:"jobtracker",
    timestamp:firebase.firestore.FieldValue.serverTimestamp(),
    reactions:{},
    resolved:false
  }).catch(function(e){console.warn("Note save failed:",e)});
}

function __mfxAddReaction(noteId,emoji){
  if(!jtAuth.currentUser)return;
  var name=jtAuth.currentUser.displayName||jtAuth.currentUser.email.split("@")[0];
  var ref=jtDb.collection("collaboration").doc("jobtracker").collection("notes").doc(noteId);
  ref.get().then(function(doc){
    if(!doc.exists)return;
    var reactions=doc.data().reactions||{};
    if(!reactions[emoji])reactions[emoji]=[];
    var idx=reactions[emoji].indexOf(name);
    if(idx>=0)reactions[emoji].splice(idx,1);
    else reactions[emoji].push(name);
    if(reactions[emoji].length===0)delete reactions[emoji];
    ref.update({reactions:reactions});
  });
}

function __mfxResolveNote(noteId){
  jtDb.collection("collaboration").doc("jobtracker").collection("notes").doc(noteId)
    .update({resolved:true}).catch(function(){});
}

function __mfxToggleCollab(){
  __mfxCollabOpen=!__mfxCollabOpen;
  var panel=document.getElementById("mfx-collab-panel");
  if(panel)panel.style.display=__mfxCollabOpen?"flex":"none";
  var btn=document.getElementById("mfx-collab-btn");
  if(btn)btn.style.background=__mfxCollabOpen?"#00e5ff":"#0a2535";
  if(btn)btn.style.color=__mfxCollabOpen?"#060d14":"#00e5ff";
}

function __mfxRenderCollab(){
  var panel=document.getElementById("mfx-collab-content");
  if(!panel)return;
  var tab=document.getElementById("mfx-collab-tab-active");
  var activeTab=tab?tab.dataset.tab:"notes";
  
  var h="";
  
  if(activeTab==="notes"){
    // Render notes
    var activeNotes=__mfxNotes.filter(function(n){return!n.resolved});
    if(activeNotes.length===0){
      h+="<div style=\"text-align:center;padding:30px 10px;color:#4a6478;font-size:11px\">No notes yet. Start the conversation!</div>";
    }
    activeNotes.forEach(function(note){
      var ts=note.timestamp?__mfxTimeAgo(note.timestamp):"just now";
      var color=__mfxGetColor(note.author||"");
      var text=(note.text||"").replace(/@(\w[\w\s]*?)(?=\s|@|$)/g,"<span style=\"color:#00e5ff;font-weight:700;cursor:pointer\">@$1</span>");
      
      h+="<div style=\"padding:10px 12px;border-bottom:1px solid #00e5ff12;transition:background .15s\" onmouseenter=\"this.style.background=\'#0a253555\'\" onmouseleave=\"this.style.background=\'transparent\'\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\"><div style=\"width:24px;height:24px;border-radius:50%;background:"+color+"22;border:1px solid "+color+";display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:"+color+"\">"+__mfxGetInitials(note.author)+"</div><span style=\"font-size:11px;font-weight:700;color:#f5f2ed\">"+note.author+"</span><span style=\"font-size:9px;color:#4a6478;margin-left:auto\">"+ts+"</span></div>";
      h+="<div style=\"font-size:12px;color:#8aa8b8;line-height:1.5;padding-left:32px\">"+text+"</div>";
      
      // Reactions
      var reactions=note.reactions||{};
      var rKeys=Object.keys(reactions);
      if(rKeys.length>0){
        h+="<div style=\"display:flex;gap:4px;padding-left:32px;margin-top:6px;flex-wrap:wrap\">";
        rKeys.forEach(function(emoji){
          var count=reactions[emoji].length;
          var names=reactions[emoji].join(", ");
          h+="<div title=\""+names+"\" style=\"font-size:11px;padding:2px 6px;border-radius:10px;background:#00e5ff12;border:1px solid #00e5ff26;cursor:pointer\" onclick=\"__mfxAddReaction(\'"+note.id+"\',\'"+emoji+"\')\">"+emoji+" "+count+"</div>";
        });
        h+="</div>";
      }
      
      // Action row
      h+="<div style=\"display:flex;gap:8px;padding-left:32px;margin-top:4px\">";
      ["\u{1F44D}","\u2705","\u{1F440}","\u{1F525}"].forEach(function(em){
        h+="<div style=\"font-size:11px;cursor:pointer;opacity:.5;transition:opacity .15s\" onmouseenter=\"this.style.opacity=1\" onmouseleave=\"this.style.opacity=.5\" onclick=\"__mfxAddReaction(\'"+note.id+"\',\'"+em+"\')\">"+em+"</div>";
      });
      h+="<div style=\"font-size:9px;color:#4a6478;cursor:pointer;margin-left:auto;letter-spacing:.05em\" onclick=\"__mfxResolveNote(\'"+note.id+"\')\">RESOLVE</div>";
      h+="</div></div>";
    });
  } else if(activeTab==="history"){
    // Render activity history
    if(__mfxHistory.length===0){
      h+="<div style=\"text-align:center;padding:30px 10px;color:#4a6478;font-size:11px\">No recent activity</div>";
    }
    __mfxHistory.forEach(function(act){
      var ts=act.timestamp?__mfxTimeAgo(act.timestamp):"";
      var color=__mfxGetColor(act.user||"");

// ─── RENDER ────────────────────────────────────────────────────────────────
var currentTicket = null;
var currentTab = 'insights';
var editMode = false;
var editData = {};

function renderPanel(){
  if(!currentTicket){overlay.className='mfx-overlay';return;}
  overlay.className='mfx-overlay open';
  var t = currentTicket;
  editData = JSON.parse(JSON.stringify(t));

  var daysLeft = daysFromNow(t.jobDueDate);
  var isOverdue = daysLeft!==null && daysLeft<0 && t.jobStatus!=='Closed' && t.jobStatus!=='Accounting' && t.jobStatus!=='Cancelled';
  var isBlocked = t.blocked==='Yes'||t.blocked===true;
  var isRush = t.rush===true||t.rush==='Yes';
  var isUrgent = t.priority==='Urgent';

  // Priority badge colors
  var priBg = {Urgent:'#f443',High:'#fa03',Medium:'#0ff3',Low:'#0f03'}[t.priority]||'#8883';
  var priColor = {Urgent:'#f44',High:'#fa0',Medium:'#00e5ff',Low:'#0f0'}[t.priority]||'#888';

  var html = '<div class="mfx-detail">';

  // ─ HEADER
  html += '<div class="mfx-detail-header">';
  html += '<h2>#'+e(t.jobTicketNumber)+' — '+e(t.clientName||'Unknown Client')+'</h2>';
  if(isRush) html+='<span class="badge" style="background:#f443;color:#f44;border:1px solid #f44">🔥 RUSH</span>';
  if(isBlocked) html+='<span class="badge" style="background:#fa03;color:#fa0;border:1px solid #fa0">🚫 BLOCKED</span>';
  if(isOverdue) html+='<span class="badge" style="background:#f443;color:#f44;border:1px solid #f44">⚠️ OVERDUE</span>';
  html+='<span class="badge" style="background:'+priBg+';color:'+priColor+';border:1px solid '+priColor+'">'+e(t.priority)+'</span>';
  html+='<span class="badge" style="background:#0ff2;color:#00e5ff;border:1px solid #0ff3">'+e(t.jobStatus)+'</span>';
  if(isAdmin) html+='<button class="mfx-btn mfx-btn-primary" onclick="window.__mfxToggleEdit()" id="mfxEditBtn">'+(editMode?'💾 SAVE':'✏️ EDIT')+'</button>';
  html+='<button class="close-btn" onclick="window.__mfxCloseDetail()">×</button>';
  html+='</div>';

  // ─ BODY
  html+='<div class="mfx-detail-body">';

  // ─ SIDEBAR
  html+='<div class="mfx-sidebar">';
  TABS.forEach(function(tab){
    html+='<div class="tab'+(currentTab===tab.id?' active':'')+'" onclick="window.__mfxSwitchTab(\''+tab.id+'\')">'+tab.icon+' '+tab.label+'</div>';
  });
  html+='</div>';

  // ─ CONTENT
  html+='<div class="mfx-content">';

  if(currentTab==='insights') html+=renderInsights(t,daysLeft,isOverdue,isBlocked,isRush);
  else if(currentTab==='overview') html+=renderOverview(t);
  else if(currentTab==='info') html+=renderFieldGroup('info',t);
  else if(currentTab==='accounting') html+=renderFieldGroup('accounting',t);
  else if(currentTab==='dates') html+=renderDates(t);
  else if(currentTab==='prepress') html+=renderFieldGroup('prepress',t);
  else if(currentTab==='production') html+=renderProduction(t);
  else if(currentTab==='shipping') html+=renderFieldGroup('shipping',t);
  else if(currentTab==='notes') html+=renderNotes(t);

  html+='</div></div></div>';
  overlay.innerHTML = html;
}

function e(v){return v===undefined||v===null?'':String(v).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ─── INSIGHTS TAB ──────────────────────────────────────────────────────────
function renderInsights(t,daysLeft,isOverdue,isBlocked,isRush){
  var h = '';

  // KPIs
  h+='<div class="mfx-kpi-row">';
  h+='<div class="mfx-kpi"><div class="num" style="color:'+pctColor(t.healthScore||50)+'">'+(t.healthScore||50)+'</div><div class="lbl">Health Score</div></div>';
  h+='<div class="mfx-kpi"><div class="num" style="color:#43d17a">'+money(t.value)+'</div><div class="lbl">Job Value</div></div>';
  h+='<div class="mfx-kpi"><div class="num" style="color:'+(isOverdue?'#f44':'#00e5ff')+'">'+(daysLeft!==null?(daysLeft<0?Math.abs(daysLeft)+'d late':daysLeft+'d'):'—')+'</div><div class="lbl">'+(isOverdue?'Overdue':'Days to Due')+'</div></div>';
  h+='<div class="mfx-kpi"><div class="num">'+money(t.balanceOpen||0)+'</div><div class="lbl">Open Balance</div></div>';
  h+='<div class="mfx-kpi"><div class="num">'+money(t.paymentTotal||0)+'</div><div class="lbl">Paid</div></div>';
  h+='</div>';

  // Smart Insights
  h+='<div class="mfx-section"><h3>💡 Smart Insights</h3>';

  if(isOverdue){
    h+='<div class="mfx-insight alert"><h4>⚠️ This job is '+Math.abs(daysLeft)+' days overdue</h4><p>Due date was '+fmtDate(t.jobDueDate)+'. Current status: '+e(t.jobStatus)+'. Assigned to '+e(t.assignedTo)+'. '+(isBlocked?'⚠️ Also BLOCKED — '+e(t.blockerNotes||t.blockerCategory):'Consider escalating or updating the due date.')+'</p></div>';
  }
  if(isBlocked){
    h+='<div class="mfx-insight alert"><h4>🚫 Blocked — '+e(t.blockerCategory||'Unknown Reason')+'</h4><p>'+e(t.blockerNotes||'No details provided. Update blocker notes to keep the team informed.')+'</p></div>';
  }
  if(isRush){
    h+='<div class="mfx-insight warn"><h4>🔥 Rush Job — Priority Handling Required</h4><p>This job is flagged as a RUSH order. Ensure it moves through each stage without delays. Current stage: '+e(t.jobStatus)+'.</p></div>';
  }
  if(t.jobStatus==='Waiting on Approval' && daysLeft!==null && daysLeft<5){
    h+='<div class="mfx-insight warn"><h4>⏰ Waiting on Client Approval — Due Soon</h4><p>Job is waiting on approval with only '+(daysLeft<0?'overdue':daysLeft+' days left')+'. Follow up with '+e(t.clientName)+' on approval status.</p></div>';
  }
  if(t.jobStatus==='Accounting' && (!t.invoice||t.invoice==='')){
    h+='<div class="mfx-insight warn"><h4>💰 In Accounting — No Invoice # Yet</h4><p>This job is in Accounting stage but no invoice number has been entered. Generate and send invoice to '+e(t.clientName)+'.</p></div>';
  }
  if(t.jobStatus==='Accounting' && t.invoice && (t.balanceOpen||0)>0){
    h+='<div class="mfx-insight warn"><h4>💰 Open Balance: '+money(t.balanceOpen)+'</h4><p>Invoice #'+e(t.invoice)+' has been created. Payment terms: '+e(t.terms)+'. Follow up on collection.</p></div>';
  }
  if(t.value && t.value > 20000){
    h+='<div class="mfx-insight ok"><h4>💎 High-Value Job: '+money(t.value)+'</h4><p>This is a significant job. Ensure quality checks are thorough and client communication is proactive.</p></div>';
  }
  if(!t.jobDueDate || t.jobDueDate===''){
    h+='<div class="mfx-insight warn"><h4>📅 No Due Date Set</h4><p>This ticket has no due date. Set a target date to keep the workflow on track.</p></div>';
  }
  if(t.jobStatus!=='Closed' && t.jobStatus!=='Cancelled' && t.jobStatus!=='Accounting'){
    // Suggest next action
    var nextActions = {
      'CSR Intake':'Review job specs, confirm with client, and move to Pre-Press when ready.',
      'Pre-Press in progress':'Complete artwork prep, create proofs, and send for client approval.',
      'Waiting on Approval':'Follow up with '+e(t.clientName)+' for proof approval. Check email/phone.',
      'Materials Verification':'Verify all materials are available. Check roll stock, ink, and plates.',
      'Working on Material - Ordered':'Track material delivery. Update ETA when shipping info available.',
      'Production | Waiting on Press':'Schedule press time. Check press availability and plate status.',
      'Production | Scheduled':'Confirm press schedule. Prep materials for production run.',
      'Production | Running':'Monitor press run. Check quality during production.',
      'HOLD':'Review hold reason and resolve blocker to resume workflow.',
    };
    if(nextActions[t.jobStatus]){
      h+='<div class="mfx-insight ok"><h4>✅ Next Step</h4><p>'+nextActions[t.jobStatus]+'</p></div>';
    }
  }
  if(t.jobStatus==='Closed'){
    h+='<div class="mfx-insight ok"><h4>✅ Job Complete</h4><p>Closed'+(t.dateClosed?' on '+fmtDate(t.dateClosed):'')+'. Value: '+money(t.value)+'. Paid: '+money(t.paymentTotal)+'.'+(t.dateShipped?' Shipped '+fmtDate(t.dateShipped)+'.':'')+'</p></div>';
  }

  h+='</div>';

  // Quick Facts
  h+='<div class="mfx-section"><h3>📊 Quick Facts</h3><div class="mfx-grid">';
  h+=fieldCard('Assigned',t.assignedTo);
  h+=fieldCard('Department',t.owner);
  h+=fieldCard('Run Type',t.runType);
  h+=fieldCard('Press',t.press);
  h+=fieldCard('PO #',t.po);
  h+=fieldCard('Invoice',t.invoice);
  h+=fieldCard('Terms',t.terms);
  h+=fieldCard('Paperwork',t.paperworkLocation);
  h+='</div></div>';

  return h;
}

function fieldCard(label,val){
  var isEmpty = $(val)||val==='';
  return '<div class="mfx-field"><label>'+label+'</label><div class="val'+(isEmpty?' empty':'')+'">'+e(isEmpty?'Not set':val)+'</div></div>';
}

// ─── FIELD GROUP RENDERER (editable) ───────────────────────────────────────
function renderFieldGroup(groupId,t){
  var fields = FIELD_GROUPS[groupId];
  if(!fields) return '<p>No fields defined</p>';

  var h='<div class="mfx-section'+(editMode?' mfx-edit-mode':'')+'"><h3>'+{info:'📋 Job Information',accounting:'💰 Accounting & Payment',prepress:'🎨 Pre-Press',shipping:'📦 Shipping & Billing'}[groupId]+'</h3>';
  h+='<div class="mfx-grid">';

  fields.forEach(function(f){
    var val = t[f.key];
    var isReadonly = f.readonly || !editMode || !isAdmin;

    h+='<div class="mfx-field">';
    h+='<label>'+f.label+'</label>';

    if(editMode && isAdmin && !f.readonly){
      if(f.type==='select'){
        h+='<select data-key="'+f.key+'" onchange="window.__mfxFieldChange(\''+f.key+'\',this.value)">';
        (f.options||[]).forEach(function(opt){
          var optVal = typeof opt==='boolean'?opt:opt;
          var optLabel = f.displayAs?f.displayAs(opt):String(opt||'— Select —');
          var selected = String(val)===String(optVal)?'selected':'';
          h+='<option value="'+e(optVal)+'" '+selected+'>'+e(optLabel)+'</option>';
        });
        h+='</select>';
      } else if(f.type==='textarea'){
        h+='<textarea data-key="'+f.key+'" rows="3" onchange="window.__mfxFieldChange(\''+f.key+'\',this.value)">'+e(val||'')+'</textarea>';
      } else {
        h+='<input type="'+(f.type==='number'?'number':f.type==='date'?'date':'text')+'" data-key="'+f.key+'" value="'+e(val||'')+'" onchange="window.__mfxFieldChange(\''+f.key+'\',this.value)"'+(f.type==='number'?' step="0.01"':'')+'>';
      }
    } else {
      var displayVal = val;
      if(f.displayAs) displayVal = f.displayAs(val);
      else if(f.prefix==='$') displayVal = money(val);
      else if(f.type==='date') displayVal = fmtDate(val);

      var cls = 'val';
      if($(displayVal)||displayVal===''||displayVal==='—') cls+=' empty';
      if(f.prefix==='$' && val>0) cls+=' money';
      if(f.type==='date' && displayVal!=='—') cls+=' date';

      h+='<div class="'+cls+'">'+e($(displayVal)||displayVal===''?'Not set':displayVal)+'</div>';
    }
    h+='</div>';
  });

  h+='</div></div>';
  return h;
}

// ─── DATES TAB ─────────────────────────────────────────────────────────────
function renderDates(t){
  var h = renderFieldGroup('dates',t);

  // Timeline
  h+='<div class="mfx-section"><h3>📅 Workflow Timeline</h3>';
  h+='<div class="mfx-timeline">';

  var events = [];
  if(t.dateTicketCreated) events.push({date:t.dateTicketCreated,desc:'Ticket Created'});
  if(t.artReceivedDate) events.push({date:t.artReceivedDate,desc:'Art Received'});
  if(t.proofSent) events.push({date:t.proofSent,desc:'Proof Sent to Client'});
  if(t.dateApprovedByClient) events.push({date:t.dateApprovedByClient,desc:'Client Approved'});
  if(t.clientApproval) events.push({date:t.clientApproval,desc:'Client Approval'});
  if(t.estimatedRunDate) events.push({date:t.estimatedRunDate,desc:'Estimated Run Date'});
  if(t.dateShipped) events.push({date:t.dateShipped,desc:'Shipped'});
  if(t.dateClosed) events.push({date:t.dateClosed,desc:'Closed'});
  if(t.paymentDate) events.push({date:t.paymentDate,desc:'Payment Received'});

  events.sort(function(a,b){return new Date(a.date)-new Date(b.date)});

  if(events.length===0){
    h+='<p style="color:#4a6478;font-style:italic">No timeline events yet. Dates will appear here as the job progresses.</p>';
  } else {
    events.forEach(function(ev){
      h+='<div class="event"><div class="date">'+fmtDate(ev.date)+'</div><div class="desc">'+e(ev.desc)+'</div></div>';
    });
  }
  h+='</div></div>';
  return h;
}

// ─── PRODUCTION TAB ────────────────────────────────────────────────────────
function renderProduction(t){
  var h='<div class="mfx-section"><h3>🏭 Production Details</h3>';
  h+='<div class="mfx-grid">';
  h+=fieldCard('Press',t.press);
  h+=fieldCard('Run Type',t.runType);
  h+=fieldCard('Job Type',t.jobType);
  h+=fieldCard('Plate Due By',fmtDate(t.plateDueBy));
  h+=fieldCard('Est. Run Date',fmtDate(t.estimatedRunDate));
  h+=fieldCard('Exact Qty?',t.exactQuantity?'Yes':'No');
  h+=fieldCard('+/- 10% Overs?',t.plusMinusTen?'Yes':'No');
  h+=fieldCard('Must Have Over',t.mustHaveOver||'—');
  h+='</div></div>';

  // Workflow Progress
  var stages=['CSR Intake','Pre-Press in progress','Waiting on Approval','Materials Verification','Working on Material - Ordered','Production | Waiting on Press','Production | Scheduled','Production | Running','HOLD','QA | Review - Remainder','Shipping | Ready','Shipped','Accounting','Closed'];
  var idx=stages.indexOf(t.jobStatus);
  var pct=idx>=0?Math.round(((idx+1)/stages.length)*100):0;

  h+='<div class="mfx-section"><h3>📊 Workflow Progress — '+pct+'%</h3>';
  h+='<div class="mfx-progress-bar"><div class="fill" style="width:'+pct+'%;background:linear-gradient(90deg,#00e5ff,#08f)"></div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">';
  stages.forEach(function(s,i){
    var active=i<=idx;
    var current=s===t.jobStatus;
    h+='<span style="padding:2px 8px;border-radius:10px;font-size:10px;background:'+(current?'#0ff3':active?'#0ff15':'#0ff08')+';color:'+(current?'#00e5ff':active?'#8af':'#4a6478')+';border:1px solid '+(current?'#00e5ff':'transparent')+'">'+s.split('|')[0].trim()+'</span>';
  });
  h+='</div></div>';

  return h;
}

// ─── GLOBAL FUNCTIONS ──────────────────────────────────────────────────────
window.__mfxOpenDetail = function(ticketId){
  var tickets = window.__MFX_TICKETS||[];
  currentTicket = tickets.find(function(t){return t.id===ticketId||t.jobTicketNumber===ticketId});
  if(!currentTicket) return;
  currentTab='insights';
  editMode=false;
  renderPanel();
};

window.__mfxCloseDetail = function(){
  currentTicket=null;
  overlay.className='mfx-overlay';
};

window.__mfxSwitchTab = function(tab){
  currentTab=tab;
  renderPanel();
};

window.__mfxToggleEdit = function(){
  if(editMode){
    // SAVE
    editMode=false;
    if(typeof jtDb!=='undefined' && currentTicket){
      var ref = jtDb.collection('jobTickets').doc(currentTicket.id);
      editData.updatedAt = new Date().toISOString();
      ref.set(editData,{merge:true}).then(function(){
        console.log('Saved ticket '+currentTicket.id);
      }).catch(function(err){console.warn('Save error:',err)});
      // Update local
      Object.assign(currentTicket, editData);
    }
  } else {
    editMode=true;
    editData=JSON.parse(JSON.stringify(currentTicket));
  }
  renderPanel();
};

window.__mfxFieldChange = function(key,val){
  editData[key]=val;
  // Auto-update the local ticket preview (not saved until Save click)
};

window.__mfxAddNote = function(){
  var textarea = document.getElementById('mfxNewNote');
  if(!textarea||!textarea.value.trim())return;
  var note = {
    id:'n'+Date.now(),
    text:textarea.value.trim(),
    author:jtAuth&&jtAuth.currentUser?jtAuth.currentUser.displayName||jtAuth.currentUser.email:'Unknown',
    timestamp:new Date().toISOString(),
    type:'general',
    reactions:{}
  };
  if(!currentTicket.notes)currentTicket.notes=[];
  currentTicket.notes.push(note);
  // Save to Firestore
  if(typeof jtDb!=='undefined'){
    jtDb.collection('jobTickets').doc(currentTicket.id).update({
      notes:currentTicket.notes,
      updatedAt:new Date().toISOString()
    }).catch(function(err){console.warn('Note save error:',err)});
  }
  renderPanel();
};

// ─── INTERCEPT TICKET CLICKS ───────────────────────────────────────────────
// Listen for ticket card double-clicks to open our enhanced panel
document.addEventListener('dblclick',function(ev){
  var card = ev.target.closest&&ev.target.closest('[draggable="true"]');
  if(!card)return;
  // Find the ticket number from the card text
  var text = card.innerText||'';
  var match = text.match(/#(\S+)/);
  if(match){
    ev.stopPropagation();
    ev.preventDefault();
    window.__mfxOpenDetail(match[1]);
  }
},true);

// Keyboard shortcut: Escape to close
document.addEventListener('keydown',function(ev){
  if(ev.key==='Escape'&&overlay.className.includes('open')){
    window.__mfxCloseDetail();
  }
});
