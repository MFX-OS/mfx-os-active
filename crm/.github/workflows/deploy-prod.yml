name: Deploy · production
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Hard gate: a human must approve in the "production" environment before this runs
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crm.microflexfilm.com
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      # Auth to GCP via Workload Identity Federation
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_PROD }}

      - run: npm run build
      - run: npx firebase deploy --project prod --non-interactive

      - name: Smoke test
        run: |
          curl -fsSL https://crm.microflexfilm.com/health || (echo "Smoke failed" && exit 1)
